<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Drive-In Archives — Harsha Royal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
    
    <!-- Retro Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Rye&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Twilight Palette */
            --sky-top: #1b0b2e;
            --sky-mid: #4a1942;
            --sky-low: #89314b;
            --sky-horizon: #eb6841; /* bright warm orange */
            
            --text-main: #fcf8f2;
            --text-accent: #f7d059; /* retro gold/yellow */
            
            --ticket-bg: #e6dac3;
            --ticket-text: #8c1c13;
        }

        body, html {
            margin: 0; padding: 0;
            background: linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-mid) 40%, var(--sky-low) 75%, var(--sky-horizon) 100%);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Ambient Faint Stars */
        .stars {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1;
            pointer-events: none;
            background-image: 
                radial-gradient(1px 1px at 10% 10%, #fff 100%, transparent),
                radial-gradient(1.5px 1.5px at 25% 15%, #fff 100%, transparent),
                radial-gradient(1px 1px at 40% 5%, #fff 100%, transparent),
                radial-gradient(2px 2px at 60% 20%, #fff 100%, transparent),
                radial-gradient(1px 1px at 75% 8%, #fff 100%, transparent),
                radial-gradient(1.5px 1.5px at 90% 12%, #fff 100%, transparent),
                radial-gradient(1px 1px at 15% 35%, #fff 100%, transparent),
                radial-gradient(2px 2px at 80% 30%, #fff 100%, transparent);
            background-size: 550px 550px;
            opacity: 0.6;
            animation: twinkle 4s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.4; }
            100% { opacity: 0.8; }
        }

        /* Light Film Scratches and Dust */
        .scratches {
            position: fixed; inset: 0; z-index: 2; pointer-events: none;
            background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            opacity: 0.08; mix-blend-mode: color-dodge;
        }

        /* Soft Lens Flare */
        .lens-flare {
            position: fixed;
            top: 10%; right: 15%;
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(255, 230, 150, 0.4) 0%, rgba(255, 100, 50, 0.1) 40%, transparent 70%);
            border-radius: 50%;
            z-index: 1; pointer-events: none;
            filter: blur(20px);
            mix-blend-mode: screen;
        }

        /* Subtle Projector Light Beam from bottom center */
        .light-beam {
            position: fixed;
            bottom: -50px; left: 50%;
            transform: translateX(-50%);
            width: 140vw; height: 100vh;
            background: conic-gradient(from 180deg at 50% 100%, transparent 145deg, rgba(255,255,255,0.06) 160deg, rgba(255,255,255,0.12) 180deg, rgba(255,255,255,0.06) 200deg, transparent 215deg);
            z-index: 5; pointer-events: none;
            animation: flicker 6s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 0.8; }
            10% { opacity: 1; }
            20% { opacity: 0.7; }
            30% { opacity: 0.9; }
            40% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        /* Master Container */
        .drive-in-container {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 40px 100px;
        }

        /* Top Bar: Ticket Booth Nav */
        .ticket-nav {
            display: flex;
            justify-content: center;
            margin-bottom: 60px;
        }

        .ticket-booth {
            background-color: var(--ticket-bg);
            padding: 12px 32px;
            border-radius: 8px;
            border: 3px dashed var(--ticket-text);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 15px rgba(140,28,19,0.1);
            display: flex; gap: 32px;
            transform: rotate(-1deg);
        }

        .ticket-booth a {
            color: var(--ticket-text);
            font-family: 'Righteous', display;
            text-transform: uppercase;
            text-decoration: none;
            font-size: 16px;
            letter-spacing: 2px;
            transition: color 0.3s, transform 0.2s;
        }

        .ticket-booth a:hover {
            color: #d13022;
            transform: scale(1.1);
        }

        /* Hero Header */
        .hero-section {
            text-align: center;
            margin-bottom: 80px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        .hero-section h1 {
            font-family: 'Rye', serif; /* super retro cinematic */
            color: var(--text-accent);
            font-size: clamp(3rem, 6vw, 5.5rem);
            margin: 0 0 12px 0;
            font-weight: normal;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .hero-section p {
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            color: #ffd8a8;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 600;
            margin: 0;
        }

        /* Projector Screens Grid */
        .screens-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 50px;
            align-items: center;
            justify-items: center;
        }

        /* Outdoor Screen Display Base */
        .outdoor-screen {
            position: relative;
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
            /* Floating bob animation */
            animation: float 6s ease-in-out infinite;
        }

        .outdoor-screen:nth-child(2) { animation-delay: -2s; margin-top: -40px; }
        .outdoor-screen:nth-child(3) { animation-delay: -4s; margin-top: 20px; }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* The huge projection screen frame itself */
        .screen-frame {
            background: #fff; /* the matte screen canvas */
            width: 100%;
            aspect-ratio: 3/4;
            border: 12px solid #222; /* heavy industrial black metal frame */
            border-radius: 6px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.2);
            overflow: hidden;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .outdoor-screen:hover .screen-frame {
            transform: scale(1.05);
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 20px rgba(0,0,0,0.1), 0 0 40px rgba(247, 208, 89, 0.4); /* glowing pop */
            border-color: #111;
        }

        /* The Image Projected *ON* the canvas */
        .screen-projection {
            width: 100%; height: 100%;
            object-fit: cover;
            /* Filtered to look like a projected image: slight sepia, warm contrast */
            filter: contrast(1.15) brightness(0.9) sepia(20%) hue-rotate(-5deg);
            transition: filter 0.5s ease;
        }

        .outdoor-screen:hover .screen-projection {
            filter: contrast(1.2) brightness(1.1) sepia(0%); /* sharpens up beautifully on hover */
        }

        /* Screen Stands (The metal base underneath) */
        .screen-stand {
            width: 60%;
            height: 20px;
            background: linear-gradient(to bottom, #333, #111);
            border-radius: 0 0 8px 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
            position: relative;
            margin-top: -2px; /* connects visually */
            z-index: -1;
        }
        .screen-stand::after {
            content: '';
            position: absolute;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            width: 12px; height: 60px;
            background: linear-gradient(to right, #444, #111);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        /* Playful Movie Information overlays mapped IN the screen */
        .screen-text {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 40px 24px 24px;
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
            text-align: center;
        }

        .screen-title {
            font-family: 'Righteous', display;
            font-size: 28px;
            color: #fff;
            margin: 0 0 8px 0;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            letter-spacing: 1px;
        }

        .screen-tag {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }

        @media (max-width: 1024px) {
            .screens-grid { grid-template-columns: 1fr; gap: 120px; }
            .outdoor-screen:nth-child(n) { animation-delay: 0s; margin-top: 0; }
            .hero-section h1 { font-size: 40px; }
            .ticket-booth { gap: 16px; padding: 12px 20px; }
            .ticket-booth a { font-size: 14px; }
        }
    </style>
    <script>
        // Disable right-click across the entire page
        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>
</head>
<body>

    <!-- Backdrops -->
    <div class="stars"></div>
    <div class="lens-flare"></div>
    <div class="scratches"></div>
    <div class="light-beam"></div>

    <div class="drive-in-container">
        
        <!-- Ticket Booth Nav -->
        <nav class="ticket-nav">
            <div class="ticket-booth">
                <a href="/">Home</a>
                <a href="/resume.html">About</a>
                <a href="/freelance.html">Reel</a>
                <a href="#contact">Contact</a>
            </div>
        </nav>

        <!-- Hero -->
        <header class="hero-section">
            <h1>Feature Presentations</h1>
            <p>UX Case Studies in VistaVision</p>
        </header>

        <!-- Screens Grid -->
        <main class="screens-grid">
            
            <a href="WSP-project" class="outdoor-screen">
                <div class="screen-frame">
                    <img src="../images/work-1.jpg" alt="WSP Global Architecture" class="screen-projection">
                    <div class="screen-text">
                        <h2 class="screen-title">WSP GLOBAL</h2>
                        <p class="screen-tag">Scale / Architecture</p>
                    </div>
                </div>
                <!-- Mini projection stand -->
                <div class="screen-stand"></div>
            </a>

            <a href="Intel-project" class="outdoor-screen">
                <div class="screen-frame">
                    <img src="../images/work-1.jpg" alt="Intel AI Bots" class="screen-projection">
                    <div class="screen-text">
                        <h2 class="screen-title">INTEL AI</h2>
                        <p class="screen-tag">System / Chatbots</p>
                    </div>
                </div>
                <!-- Mini projection stand -->
                <div class="screen-stand"></div>
            </a>

            <a href="Bajaj-project" class="outdoor-screen">
                <div class="screen-frame">
                    <img src="../images/work-1.jpg" alt="Bajaj Pay Application" class="screen-projection">
                    <div class="screen-text">
                        <h2 class="screen-title">BAJAJ PAY</h2>
                        <p class="screen-tag">Fintech / Mobile</p>
                    </div>
                </div>
                <!-- Mini projection stand -->
                <div class="screen-stand"></div>
            </a>

        </main>
    </div>

    <script src="../js/snowflake_cursor.js" defer></script>
</body>
</html>
